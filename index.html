<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeepoZax - Pepo Chasing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 48px;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 4px solid white;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            color: white;
            margin-top: 20px;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            color: white;
            margin-top: 15px;
            font-size: 14px;
        }

        #score, #lives {
            font-weight: bold;
            color: #FFD700;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
            font-size: 32px;
            min-width: 300px;
        }

        .game-over h2 {
            margin-bottom: 20px;
            color: #FFD700;
        }

        .game-over p {
            margin: 10px 0;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔪 PeepoZax 🔪</h1>
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div class="game-over" id="gameOver">
                <h2>GAME OVER!</h2>
                <p id="finalScore">Final Score: 0</p>
                <p style="margin-top: 30px; font-size: 16px;">Refresh the page to play again!</p>
            </div>
        </div>
        <div class="info">
            Score: <span id="score">0</span> | Lives: <span id="lives">3</span>
        </div>
        <div class="controls">
            <p>Use ARROW KEYS or WASD to move | SPACE to swing axe</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
